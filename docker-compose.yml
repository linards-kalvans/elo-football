services:
  app:
    build: 
      context: .
      args:
        DOCKER_BUILDKIT: 1
    ports:
      - "8001:8000"
    volumes:
      - ./data:/app/data
    environment:
      - ELO_DB_PATH=/app/data/elo.db
      - FOOTBALL_DATA_API_KEY=${FOOTBALL_DATA_API_KEY}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  cron:
    build: .
    volumes:
      - ./data:/app/data
    environment:
      - FOOTBALL_DATA_API_KEY=${FOOTBALL_DATA_API_KEY}
      - ELO_DB_PATH=/app/data/elo.db
    restart: unless-stopped
    command: ["python", "scripts/cron_runner.py"]
